<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>⚡ 스피드 골든벨 v5 — 현황판</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg0:#04090f;--bg1:#0a1628;--bg2:#1e293b;--bg3:#334155;
  --orange:#f97316;--gold:#f59e0b;--green:#4ade80;--red:#f87171;--blue:#60a5fa;--purple:#a78bfa;
  --t1:#f1f5f9;--t2:#94a3b8;--t3:#475569;
}
html,body{width:100vw;height:100vh;overflow:hidden;background:var(--bg0);color:var(--t1);
  font-family:'Pretendard Variable','Pretendard','Apple SD Gothic Neo','Malgun Gothic','Segoe UI',Arial,sans-serif;}
body{display:flex;flex-direction:column;}

header{
  background:rgba(10,22,40,.97);border-bottom:2px solid rgba(249,115,22,.5);
  padding:0 40px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;height:62px;
}
.logo{font-size:22px;font-weight:900;color:var(--orange);letter-spacing:2px;}
.hstats{display:flex;gap:52px;}
.hstat{text-align:center;}
.hnum{font-size:32px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
.hlbl{font-size:11px;color:var(--t3);margin-top:1px;letter-spacing:.5px;}
.cg{color:var(--green);}.cr{color:var(--red);}.cb{color:var(--blue);}

main{flex:1;display:flex;flex-direction:column;overflow:hidden;position:relative;}

/* ══ 로비 ══ */
#sLobby{flex:1;display:flex;align-items:stretch;position:relative;overflow:hidden;}
.lobby-bg{position:absolute;inset:0;
  background:radial-gradient(ellipse 55% 60% at 28% 50%,rgba(249,115,22,.07) 0%,transparent 70%),
             radial-gradient(ellipse 50% 55% at 76% 50%,rgba(96,165,250,.05) 0%,transparent 70%);}
.lobby-left{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(14px,2.2vh,28px);padding:40px 20px 40px 60px;position:relative;z-index:1;}
.lobby-bell{font-size:clamp(68px,9vw,128px);animation:bellring 3.5s ease-in-out infinite;}
@keyframes bellring{0%,60%,100%{transform:rotate(0)}65%{transform:rotate(-12deg)}70%{transform:rotate(12deg)}75%{transform:rotate(-8deg)}80%{transform:rotate(8deg)}85%{transform:rotate(0)}}
.lobby-title{font-size:clamp(32px,5vw,70px);font-weight:900;color:var(--orange);letter-spacing:3px;text-align:center;text-shadow:0 0 40px rgba(249,115,22,.3);}
.lobby-count-card{background:rgba(30,41,59,.75);backdrop-filter:blur(8px);
  border:1px solid rgba(96,165,250,.25);border-radius:20px;
  padding:clamp(12px,1.8vw,24px) clamp(28px,4vw,52px);text-align:center;
  box-shadow:0 4px 32px rgba(96,165,250,.1);}
.lobby-count-num{font-size:clamp(48px,8vw,118px);font-weight:900;color:var(--blue);
  line-height:1;font-variant-numeric:tabular-nums;text-shadow:0 0 30px rgba(96,165,250,.4);}
.lobby-count-lbl{font-size:clamp(12px,1.4vw,20px);color:var(--t2);margin-top:5px;letter-spacing:1px;}
.lobby-hint{font-size:clamp(12px,1.4vw,20px);color:var(--t2);animation:breathe 2.5s ease-in-out infinite;}
@keyframes breathe{0%,100%{opacity:.4}50%{opacity:1}}
.lobby-divider{width:1px;flex-shrink:0;margin:34px 0;
  background:linear-gradient(to bottom,transparent,rgba(249,115,22,.35) 20%,rgba(249,115,22,.35) 80%,transparent);}
.lobby-right{flex:0 0 auto;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:clamp(10px,1.8vh,20px);padding:40px 60px 40px 20px;position:relative;z-index:1;}
.qr-card{background:#fff;border-radius:16px;padding:clamp(7px,1.1vw,14px);position:relative;overflow:visible;
  box-shadow:0 0 0 6px rgba(249,115,22,.12),0 0 60px rgba(249,115,22,.17);}
.qr-card img{display:block;width:clamp(165px,21vw,316px);height:clamp(165px,21vw,316px);border-radius:7px;}
.qr-card-ph{width:clamp(165px,21vw,316px);height:clamp(165px,21vw,316px);background:var(--bg2);
  border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:10px;color:var(--t3);font-size:14px;text-align:center;padding:20px;}
.qc{position:absolute;width:22px;height:22px;border-color:var(--orange);border-style:solid;z-index:2;}
/* right/bottom 대신 left/top+calc 로 통일 — right 속성 오작동 방지 */
.qc.tl{top:-5px;left:-5px;                       border-width:4px 0 0 4px;border-radius:4px 0 0 0;}
.qc.tr{top:-5px;left:calc(100% - 17px);           border-width:4px 4px 0 0;border-radius:0 4px 0 0;}
.qc.bl{top:calc(100% - 17px);left:-5px;           border-width:0 0 4px 4px;border-radius:0 0 0 4px;}
.qc.br{top:calc(100% - 17px);left:calc(100% - 17px);border-width:0 4px 4px 0;border-radius:0 0 4px 0;}
.qr-label{font-size:clamp(14px,1.5vw,21px);font-weight:700;color:var(--t1);text-align:center;}
.qr-url{font-size:clamp(9px,.85vw,12px);color:var(--blue);text-align:center;max-width:clamp(165px,21vw,316px);word-break:break-all;opacity:.8;}

/* ══ 문제 ══ */
#sQuestion{flex:1;display:none;flex-direction:column;gap:10px;padding:13px 38px;}
.pt-row{display:flex;align-items:center;gap:13px;}
.prog-bar{flex:1;background:var(--bg2);border-radius:4px;height:7px;overflow:hidden;}
.prog-fill{height:100%;background:var(--orange);border-radius:4px;transition:width .4s;}
.tr{position:relative;width:76px;height:76px;flex-shrink:0;}
.tr svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.tr-bg{fill:none;stroke:var(--bg2);stroke-width:7;}
.tr-fg{fill:none;stroke:var(--orange);stroke-width:7;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .3s;}
.tr-fg.amber{stroke:var(--gold);}
.tr-fg.urgent{stroke:var(--red);}
.tr-n{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:900;color:var(--orange);font-variant-numeric:tabular-nums;}
.tr-n.amber{color:var(--gold);}
.tr-n.urgent{color:var(--red);}
.type-badge{display:inline-block;padding:3px 11px;border-radius:14px;font-size:13px;font-weight:700;margin-bottom:5px;}
.tb-choice{background:#1e3a5f;color:var(--blue);}
.tb-ox{background:#1a2e1a;color:var(--green);}
.tb-short{background:#451a03;color:var(--gold);}
.lock-banner{background:#052e16;border:2px solid var(--green);border-radius:9px;
  padding:7px;text-align:center;font-size:clamp(13px,1.5vw,19px);font-weight:700;color:var(--green);flex-shrink:0;}
.qbox{background:var(--bg2);border:2px solid var(--bg3);border-radius:15px;
  padding:clamp(13px,1.8vw,24px) clamp(17px,2.8vw,36px);text-align:center;flex-shrink:0;}
.qnum{font-size:13px;color:var(--t3);margin-bottom:5px;}
.qtext{font-size:clamp(21px,2.8vw,37px);font-weight:800;line-height:1.4;color:var(--t1);}

/* 보기 */
.cgrid{display:grid;gap:9px;flex:1;min-height:0;}
.cgrid.t-2{grid-template-columns:1fr 1fr;}
.ccard{background:var(--bg2);border:2px solid var(--bg3);border-radius:13px;
  padding:clamp(9px,1.4vw,19px) clamp(13px,1.9vw,25px);
  display:flex;align-items:center;gap:clamp(9px,1.4vw,17px);transition:all .5s;}
.ccard.correct{border-color:var(--green);background:#052e16;}
.ccard.wrong{opacity:.27;}
.clabel{width:clamp(36px,4.8vw,56px);height:clamp(36px,4.8vw,56px);border-radius:50%;
  background:var(--bg3);display:flex;align-items:center;justify-content:center;
  font-size:clamp(14px,1.9vw,24px);font-weight:900;flex-shrink:0;color:var(--t2);}
.ccard.correct .clabel{background:var(--green);color:#052e16;}
.ctext{font-size:clamp(16px,2.1vw,29px);font-weight:700;flex:1;}
.oxcard{border-radius:16px;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:7px;border:3px solid var(--bg3);background:var(--bg2);transition:all .5s;}
.oxcard.co{border-color:#3b82f6;background:#0c2a4a;}
.oxcard.cx{border-color:var(--red);background:#2d0f0f;}
.oxcard.wrong{opacity:.27;}
.ox-big{font-size:clamp(54px,8vw,94px);line-height:1;}

/* 단답형 */
.short-display{flex:1;background:var(--bg2);border-radius:13px;padding:clamp(13px,1.8vw,22px);
  display:flex;flex-direction:column;gap:11px;}
.short-top{display:flex;align-items:center;gap:18px;}
.short-count-big{font-size:clamp(38px,6vw,70px);font-weight:900;color:var(--orange);line-height:1;font-variant-numeric:tabular-nums;}
.short-lbl{font-size:clamp(13px,1.4vw,19px);color:var(--t2);}
.short-grid{display:flex;flex-wrap:wrap;gap:7px;overflow:hidden;max-height:clamp(75px,12vh,125px);}
.short-chip{background:var(--bg3);border-radius:18px;padding:4px 13px;
  font-size:clamp(11px,1.1vw,15px);color:var(--t1);transition:all .4s;}
.short-chip.correct{background:#16a34a;color:#fff;}
.short-chip.wrong{opacity:.33;text-decoration:line-through;}

/* 차트 */
.chart-wrap{flex:1;position:relative;min-height:0;}

/* 팝업 */
.pop{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);
  background:var(--bg2);border-radius:18px;padding:clamp(18px,2.4vw,32px) clamp(28px,3.8vw,54px);
  text-align:center;z-index:100;transition:transform .3s cubic-bezier(.34,1.56,.64,1);}
.pop.show{transform:translate(-50%,-50%) scale(1);}
.pop-elim{border:3px solid var(--red);}
.pt{font-size:clamp(20px,2.9vw,34px);font-weight:900;margin-bottom:5px;}
.pn{font-size:clamp(13px,1.7vw,21px);}

/* 종료 */
#sGameover{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;padding:40px;}
.go-icon{font-size:clamp(68px,10vw,118px);animation:bounce 1s ease-in-out infinite alternate;}
@keyframes bounce{0%{transform:translateY(0)}100%{transform:translateY(-17px)}}
.go-title{font-size:clamp(38px,6vw,80px);font-weight:900;text-shadow:0 0 40px rgba(245,158,11,.4);}
.go-title.golden{color:var(--gold);}
.go-title.skull{color:var(--red);text-shadow:0 0 40px rgba(248,113,113,.4);}
.go-winners{font-size:clamp(20px,3.4vw,50px);font-weight:800;color:var(--green);line-height:1.4;}
.go-winners.all-elim{color:var(--red);}
.conf{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.cp{position:absolute;animation:cfall linear forwards;}
@keyframes cfall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

/* QR 오버레이 */
.qr-overlay{position:fixed;inset:0;background:rgba(0,0,0,.92);display:none;align-items:center;justify-content:center;z-index:200;}
.qr-overlay.show{display:flex;}
.qr-popup{background:var(--bg1);border:4px solid var(--orange);border-radius:24px;
  padding:clamp(20px,2.8vw,44px);text-align:center;animation:popIn .4s cubic-bezier(.34,1.56,.64,1);max-width:90vw;}
@keyframes popIn{from{transform:scale(.7);opacity:0}to{transform:scale(1);opacity:1}}
.qp-icon{font-size:clamp(30px,4vw,50px);margin-bottom:7px;}
.qp-title{font-size:clamp(19px,2.4vw,32px);font-weight:900;color:var(--orange);margin-bottom:5px;}
.qp-sub{font-size:clamp(11px,1.2vw,16px);color:var(--t2);margin-bottom:16px;}
.qp-qr{background:#fff;border-radius:11px;padding:clamp(6px,.9vw,12px);display:inline-block;}
.qp-qr img{display:block;width:clamp(145px,16vw,250px);height:clamp(145px,16vw,250px);border-radius:5px;}
.qp-url{font-size:clamp(9px,.8vw,12px);color:var(--blue);margin-top:9px;word-break:break-all;max-width:clamp(145px,16vw,250px);}
.qp-cd{font-size:clamp(10px,.9vw,14px);color:var(--t3);margin-top:7px;}
.qp-close{margin-top:13px;background:var(--bg3);color:var(--t1);border:none;border-radius:9px;padding:8px 28px;font-size:14px;font-weight:700;cursor:pointer;}
.qr-fab{position:fixed;bottom:22px;right:22px;background:var(--orange);color:#0f172a;border:none;border-radius:50%;width:54px;height:54px;font-size:21px;cursor:pointer;box-shadow:0 4px 16px rgba(249,115,22,.44);display:none;align-items:center;justify-content:center;z-index:150;transition:transform .15s;}
.qr-fab:hover{transform:scale(1.1);}
.qr-fab.visible{display:flex;}

/* 카운트다운 오버레이 */
@keyframes cdpulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}

/* 정답 칩 글로우 */
@keyframes chipGlow{
  0%{transform:scale(1);box-shadow:none;}
  45%{transform:scale(1.22);box-shadow:0 0 26px rgba(74,222,128,.75),0 0 6px rgba(74,222,128,.5);}
  100%{transform:scale(1.1);box-shadow:0 0 14px rgba(74,222,128,.45);}
}
.short-chip.correct{background:#16a34a;color:#fff;animation:chipGlow .55s ease-out forwards;}

/* 정답 공개 플로팅 박스 */
#ansRevealBox{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0);
  opacity:0;
  background:linear-gradient(145deg,#021a0d,#05270f);
  border:3px solid var(--green);border-radius:22px;
  padding:clamp(16px,2.5vw,36px) clamp(32px,5.5vw,88px);
  text-align:center;z-index:50;pointer-events:none;
  box-shadow:0 0 80px rgba(74,222,128,.2),inset 0 1px 0 rgba(74,222,128,.12);
  transition:transform .5s cubic-bezier(.34,1.56,.64,1),opacity .3s;
  max-width:80vw;
}
#ansRevealBox.show{transform:translate(-50%,-50%) scale(1);opacity:1;}
#ansRevealBox.hide{transform:translate(-50%,-50%) scale(0);opacity:0;transition:transform .3s ease-in,opacity .25s;}
.arb-label{font-size:clamp(11px,1.1vw,16px);color:var(--t3);letter-spacing:3px;text-transform:uppercase;
  margin-bottom:clamp(6px,.9vw,12px);font-weight:700;}
.arb-answer{font-size:clamp(28px,4.8vw,68px);font-weight:900;color:var(--green);
  text-shadow:0 0 30px rgba(74,222,128,.5);line-height:1.25;word-break:keep-all;}

/* ══════════════════════════════════════════════════════════
   울트라와이드 / 서라운드 레이아웃  (가로:세로 ≥ 2:1)
   3840×1080 듀얼 · 5760×1080 트리플 · 21:9 울트라와이드
   ══════════════════════════════════════════════════════════ */
@media (min-aspect-ratio: 2/1) {

  /* ─── 헤더 ─────────────────────────────── */
  header{height:80px;padding:0 72px;}
  .logo{font-size:30px;letter-spacing:4px;}
  .hstats{gap:88px;}
  .hnum{font-size:48px;}
  .hlbl{font-size:14px;letter-spacing:1px;}

  /* ─── 문제 화면 3열 그리드 ─────────────── */
  /* 열: [타이머 220px] [문제텍스트 1fr] [보기 45%] */
  #sQuestion{
    display:grid;
    grid-template-columns:220px 1fr 45%;
    grid-template-rows:auto 1fr;
    grid-template-areas:
      "timer  banner  banner"
      "timer  qbox    choices";
    padding:18px 64px;
    gap:12px 40px;
  }
  .pt-row{
    grid-area:timer;
    flex-direction:column !important;
    align-items:center;
    justify-content:center;
    gap:22px;
  }
  /* 진행 바는 헤더의 문제 번호로 대체 */
  .prog-bar{display:none !important;}

  /* 타이머 원 키우기 */
  .tr{width:170px !important;height:170px !important;}
  .tr svg{width:170px !important;height:170px !important;}
  .tr-n{font-size:50px !important;}

  /* 회차 텍스트 (타이머 아래) */
  .pt-row .qnum-uw{display:block;}

  #lockBanner{grid-area:banner;font-size:clamp(16px,1.6vw,26px);border-radius:11px;}
  .qbox{grid-area:qbox;align-self:center;padding:clamp(18px,2vw,34px) clamp(22px,3vw,48px);}
  #contentArea{grid-area:choices;}

  /* ─── 문제 텍스트 ───────────────────────── */
  .qnum{font-size:clamp(14px,1.3vw,21px);margin-bottom:8px;}
  .type-badge{font-size:clamp(13px,1.2vw,18px);padding:4px 16px;}
  .qtext{font-size:clamp(30px,3.4vw,64px);line-height:1.35;}

  /* ─── 보기 카드 (객관식) ───────────────── */
  .ccard{
    padding:clamp(14px,1.8vw,28px) clamp(16px,2.2vw,36px);
    border-radius:18px;
    gap:clamp(12px,1.6vw,26px);
  }
  .ctext{font-size:clamp(20px,2.1vw,40px);}
  .clabel{
    width:clamp(52px,6vw,84px) !important;
    height:clamp(52px,6vw,84px) !important;
    font-size:clamp(18px,2vw,32px) !important;
    border-radius:50% !important;
  }

  /* ─── OX 카드 ──────────────────────────── */
  .ox-big{font-size:clamp(80px,13vw,180px);}

  /* ─── 단답형 ───────────────────────────── */
  .short-display{padding:clamp(18px,2vw,32px);}
  .short-count-big{font-size:clamp(56px,9vw,130px);}
  .short-lbl{font-size:clamp(16px,1.7vw,26px);}
  .short-chip{
    font-size:clamp(14px,1.3vw,22px);
    padding:7px 20px;
    border-radius:24px;
  }
  .short-grid{max-height:clamp(110px,18vh,200px);}

  /* ─── 로비 ─────────────────────────────── */
  .lobby-bell{font-size:clamp(90px,12vw,180px);}
  .lobby-title{font-size:clamp(56px,8vw,130px);letter-spacing:5px;}
  .lobby-count-num{font-size:clamp(80px,14vw,200px);}
  .lobby-count-lbl{font-size:clamp(16px,2vw,32px);}
  .lobby-hint{font-size:clamp(16px,1.8vw,28px);}
  .qr-card img{
    width:clamp(230px,27vw,440px) !important;
    height:clamp(230px,27vw,440px) !important;
  }
  .qr-card-ph{
    width:clamp(230px,27vw,440px) !important;
    height:clamp(230px,27vw,440px) !important;
  }
  .qr-label{font-size:clamp(18px,2vw,34px);}
  .qr-url{font-size:clamp(11px,1vw,16px);}

  /* ─── 종료 화면 ─────────────────────────── */
  .go-icon{font-size:clamp(110px,16vw,220px);}
  .go-title{font-size:clamp(68px,11vw,160px);}
  .go-winners{font-size:clamp(32px,5.5vw,90px);}

  /* ─── 정답 플로팅 박스 ──────────────────── */
  .arb-label{font-size:clamp(14px,1.3vw,22px);letter-spacing:4px;}
  .arb-answer{font-size:clamp(44px,6.5vw,110px);}
  #ansRevealBox{padding:clamp(22px,3vw,50px) clamp(48px,7vw,120px);border-width:4px;}
}
</style>
</head>
<body>
<header>
  <div class="logo">⚡ 스피드 골든벨</div>
  <div class="hstats">
    <div class="hstat"><div class="hnum cg" id="hSurv">0</div><div class="hlbl">생존자</div></div>
    <div class="hstat"><div class="hnum cr" id="hElim">0</div><div class="hlbl">탈락자</div></div>
    <div class="hstat"><div class="hnum cb" id="hProg">-</div><div class="hlbl">문제</div></div>
  </div>
</header>
<main>
  <!-- 정답 공개 플로팅 박스 -->
  <div id="ansRevealBox">
    <div class="arb-label">정 답</div>
    <div class="arb-answer" id="ansRevealText"></div>
  </div>

  <!-- 카운트다운 오버레이 -->
  <div id="countdownOverlay" style="position:absolute;inset:0;background:rgba(4,9,15,.93);z-index:300;display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;">
    <div id="cdNum" style="font-size:clamp(130px,22vw,240px);font-weight:900;color:var(--gold);line-height:1;text-shadow:0 0 60px rgba(245,158,11,.5);animation:cdpulse .9s ease-in-out infinite;"></div>
    <div id="cdLabel" style="font-size:clamp(20px,3vw,40px);color:var(--t2);font-weight:700;"></div>
  </div>

  <div id="sLobby">
    <div class="lobby-bg"></div>
    <div class="lobby-left">
      <div class="lobby-bell">⚡</div>
      <div class="lobby-title">스피드 골든벨</div>
      <div class="lobby-count-card">
        <div class="lobby-count-num" id="lCount">0</div>
        <div class="lobby-count-lbl">명 입장 완료</div>
      </div>
      <div class="lobby-hint">📱 QR코드를 스캔하고 입장하세요!</div>
    </div>
    <div class="lobby-divider"></div>
    <div class="lobby-right">
      <div class="qr-card">
        <div class="qc tl"></div><div class="qc tr"></div><div class="qc bl"></div><div class="qc br"></div>
        <img id="lobbyQrImg" src="" alt="" style="display:none;">
        <div class="qr-card-ph" id="lobbyQrPh"><span style="font-size:34px">📡</span><span>서버 시작 후 자동 표시</span></div>
      </div>
      <div class="qr-label">📲 스캔하여 참여</div>
      <div class="qr-url" id="qrUrlText"></div>
    </div>
  </div>

  <div id="sQuestion">
    <div class="pt-row">
      <div class="prog-bar"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
      <div class="tr">
        <svg width="76" height="76" viewBox="0 0 76 76">
          <circle class="tr-bg" cx="38" cy="38" r="31"/>
          <circle class="tr-fg" id="trFg" cx="38" cy="38" r="31" stroke-dasharray="195" stroke-dashoffset="0"/>
        </svg>
        <div class="tr-n" id="trNum">--</div>
      </div>
    </div>
    <div class="lock-banner" id="lockBanner" style="display:none">🔒 답변 마감 — 정답 자동 공개 중...</div>
    <div class="qbox">
      <div class="qnum" id="qNum">준비 중</div>
      <div id="qTypeBadge"></div>
      <div class="qtext" id="qText">--</div>
    </div>
    <div id="contentArea" style="flex:1;display:flex;flex-direction:column;min-height:0;"></div>
  </div>

  <div id="sGameover">
    <div class="go-icon" id="goIcon">🔔</div>
    <div class="go-title golden" id="goTitle">골든벨!</div>
    <div class="go-winners" id="goWinners"></div>
    <div class="conf" id="conf"></div>
  </div>
</main>

<div class="pop pop-elim" id="elimPop">
  <div class="pt" style="color:var(--red);">💀 탈락!</div>
  <div class="pn" id="elimNames" style="color:var(--t2);"></div>
</div>

<div class="qr-overlay" id="qrOverlay">
  <div class="qr-popup">
    <div class="qp-icon">⚡</div>
    <div class="qp-title">스피드 골든벨 참여</div>
    <div class="qp-sub">QR코드를 스캔하여 참여하세요!</div>
    <div class="qp-qr"><img id="qpQrImg" src="" alt="QR" width="200" height="200"></div>
    <div class="qp-url" id="qpUrl"></div>
    <div class="qp-cd" id="qpCd">30초 후 자동으로 닫힙니다</div>
    <button class="qp-close" onclick="closeQrOverlay()">닫기 ✕</button>
  </div>
</div>
<button class="qr-fab" id="qrFab" onclick="openQrOverlay()" title="QR 표시">📱</button>

<script>
const socket=io();
const CIRC=2*Math.PI*31;
const LABELS=['①','②','③','④'];
let timeLimit=15,currentChoices=[],currentType='choice',ansChart=null;
let submittedCount=0,currentCfUrl='',qpTimer=null,answersLocked=false;
const typeMap={choice:'객관식',ox:'O/X',short:'단답형'};
const tbClass={choice:'tb-choice',ox:'tb-ox',short:'tb-short'};

async function genQr(url,imgId){
  try{const d=await fetch(`/api/qr?url=${encodeURIComponent(url.replace(/\/$/,'')+'/participant.html')}`).then(r=>r.json());const img=document.getElementById(imgId);if(img){img.src=d.qr;img.style.display='block';}return d.qr;}catch{return null;}
}
async function updateLobbyQr(url){
  await genQr(url,'lobbyQrImg');
  document.getElementById('lobbyQrPh').style.display='none';
  document.getElementById('qrUrlText').textContent=url.replace(/https?:\/\//,'');
}
async function openQrOverlay(){
  if(!currentCfUrl)return;
  await genQr(currentCfUrl,'qpQrImg');
  document.getElementById('qpUrl').textContent=currentCfUrl.replace(/https?:\/\//,'');
  document.getElementById('qrOverlay').classList.add('show');
  let sec=30;clearInterval(qpTimer);
  qpTimer=setInterval(()=>{sec--;const el=document.getElementById('qpCd');if(el)el.textContent=`${sec}초 후 자동으로 닫힙니다`;if(sec<=0)closeQrOverlay();},1000);
}
function closeQrOverlay(){document.getElementById('qrOverlay').classList.remove('show');clearInterval(qpTimer);}

socket.on('cf_url',({url})=>{const isNew=url&&url!==currentCfUrl;currentCfUrl=url;updateLobbyQr(url);document.getElementById('qrFab').classList.add('visible');if(isNew&&document.getElementById('sQuestion').style.display!=='none')openQrOverlay();});
socket.on('connect',()=>{fetch('/api/status').then(r=>r.json()).then(d=>{if(!d.cfUrl)return;const isNew=d.cfUrl!==currentCfUrl;currentCfUrl=d.cfUrl;updateLobbyQr(d.cfUrl);document.getElementById('qrFab').classList.add('visible');if(isNew&&document.getElementById('sQuestion').style.display!=='none')openQrOverlay();}).catch(()=>{});});

const uwMQ = window.matchMedia('(min-aspect-ratio: 2/1)');
let _currentScreen = 'lobby';

function show(id){
  _currentScreen = id;
  const isUW = uwMQ.matches;
  document.getElementById('sLobby').style.display    = id==='lobby'    ? 'flex' : 'none';
  document.getElementById('sQuestion').style.display = id==='question' ? (isUW ? 'grid' : 'flex') : 'none';
  document.getElementById('sGameover').style.display = id==='gameover' ? 'flex' : 'none';
  const fab=document.getElementById('qrFab');
  if(id==='lobby')fab.classList.remove('visible');else if(currentCfUrl)fab.classList.add('visible');
}

// 창 크기 바뀔 때 현재 화면 display 모드 재적용
uwMQ.addEventListener('change', () => show(_currentScreen));
function updateHeader(d){const tot=d.totalPlayers||0,surv=d.survivorCount||0;document.getElementById('hSurv').textContent=surv;document.getElementById('hElim').textContent=tot-surv;document.getElementById('hProg').textContent=d.questionIndex>=0?`${d.questionIndex+1}/${d.totalQuestions}`:'-';}
function applyQuestionView(data){
  const q=data.question;if(!q)return;
  const round = data.round || (Math.floor(data.questionIndex/15)+1);
  const qInRound = data.qInRound || ((data.questionIndex%15)+1);
  document.getElementById('qNum').textContent=`${round}회차 — ${qInRound}번째 문제  (${data.questionIndex+1}/${data.totalQuestions})`;
  document.getElementById('qTypeBadge').innerHTML=`<span class="type-badge ${tbClass[q.type]||'tb-choice'}">${typeMap[q.type]||q.type}</span>`;
  document.getElementById('qText').textContent=q.question;
  document.getElementById('progFill').style.width=`${((data.questionIndex+1)/data.totalQuestions)*100}%`;
  document.getElementById('trNum').textContent=data.timeLeft||'--';
  renderChoices(q.choices||[],q.type,data.phase==='REVEAL'?q.answer:undefined);
  if(data.phase==='REVEAL'&&data.answerStats)renderChart(data.answerStats,q.choices||[],q.answer,q.type);
}

document.addEventListener('visibilitychange',()=>{if(!document.hidden&&socket.connected)socket.emit('request_state');});
window.addEventListener('focus',()=>{if(socket.connected)socket.emit('request_state');});

socket.on('state_sync',data=>{
  if(!data)return;updateHeader(data);document.getElementById('lCount').textContent=data.totalPlayers||0;
  document.getElementById('lockBanner').style.display=data.answersClosed&&data.phase==='QUESTION'?'block':'none';
  if(data.phase==='LOBBY'){show('lobby');return;}if(data.phase==='GAMEOVER'){show('gameover');return;}
  show('question');applyQuestionView(data);
});
socket.on('state',data=>{
  updateHeader(data);document.getElementById('lCount').textContent=data.totalPlayers||0;
  document.getElementById('lockBanner').style.display=data.answersClosed&&data.phase==='QUESTION'?'block':'none';
  if(data.phase==='LOBBY'){show('lobby');return;}if(data.phase==='GAMEOVER')return;
  show('question');applyQuestionView(data);
});
socket.on('player_joined',({total})=>{document.getElementById('lCount').textContent=total;document.getElementById('hSurv').textContent=total;});
socket.on('player_left',({total})=>document.getElementById('lCount').textContent=total);

socket.on('question',({index,total,question,choices,type,timeLimit:tl,round,qInRound})=>{
  timeLimit=tl||15;submittedCount=0;answersLocked=false;
  const roundTxt=(round&&qInRound)?`${round}회차 — ${qInRound}번째 문제  (${index+1}/${total})`:`문제 ${index+1} / ${total}`;
  document.getElementById('qNum').textContent=roundTxt;
  document.getElementById('qTypeBadge').innerHTML=`<span class="type-badge ${tbClass[type]||'tb-choice'}">${typeMap[type]||type}</span>`;
  document.getElementById('qText').textContent=question;
  document.getElementById('progFill').style.width=`${((index+1)/total)*100}%`;
  document.getElementById('trNum').textContent=tl;
  document.getElementById('trNum').className='tr-n';
  document.getElementById('trFg').className='tr-fg';
  document.getElementById('trFg').style.strokeDashoffset='0';
  document.getElementById('lockBanner').style.display='none';
  // 이전 정답 박스 즉시 닫기
  const arb=document.getElementById('ansRevealBox');
  if(arb){clearTimeout(arb._hideTimer);arb.classList.remove('show','hide');}
  renderChoices(choices,type);show('question');
});

socket.on('timer',({timeLeft})=>{
  const n=document.getElementById('trNum'),fg=document.getElementById('trFg');
  n.textContent=timeLeft;
  const urg=timeLeft<=5, amb=timeLeft<=8&&timeLeft>5;
  n.className='tr-n'+(urg?' urgent':amb?' amber':'');
  fg.className='tr-fg'+(urg?' urgent':amb?' amber':'');
  fg.style.strokeDashoffset=(CIRC*(1-timeLeft/timeLimit)).toFixed(1);
  if(urg&&timeLeft>0)sfx('tick');
});
socket.on('time_up',()=>{
  answersLocked=true;
  document.getElementById('lockBanner').style.display='block';
  document.getElementById('lockBanner').textContent='🔒 답변 마감 — 정답 자동 공개 중...';
});

socket.on('countdown',({from,type})=>{
  const overlay=document.getElementById('countdownOverlay');
  const numEl=document.getElementById('cdNum');
  const lblEl=document.getElementById('cdLabel');
  lblEl.textContent=type==='game_start'?'⚡ 곧 시작합니다!':'✅ 정답 공개!';
  overlay.style.display='flex';
  let n=from;numEl.textContent=n;
  sfx('tick');
  const iv=setInterval(()=>{
    n--;
    if(n<=0){clearInterval(iv);overlay.style.display='none';return;}
    numEl.textContent=n;sfx('tick');
  },1000);
});

socket.on('answers_locked',({type,answers})=>{
  answersLocked=true;document.getElementById('lockBanner').style.display='block';
  if(type==='short'&&answers){
    answers.forEach(({name,text})=>{
      const grid=document.getElementById('shortGrid');
      if(grid&&!grid.querySelector(`[data-name="${name}"]`)){
        const chip=document.createElement('span');
        chip.className='short-chip';chip.setAttribute('data-name',name);
        chip.textContent=text;chip.title=`${name}: ${text}`;
        grid.appendChild(chip);
      }
    });
  }
});

socket.on('answer_progress',({answered})=>{
  submittedCount=answered;
  const sc=document.getElementById('shortCount');if(sc)sc.textContent=answered;
});
socket.on('text_answer_in',({name,text})=>{
  const grid=document.getElementById('shortGrid');
  if(grid){const old=grid.querySelector(`[data-name="${name}"]`);if(old){old.textContent=text;return;}
    const chip=document.createElement('span');chip.className='short-chip';chip.setAttribute('data-name',name);
    chip.textContent=text;chip.title=`${name}: ${text}`;grid.appendChild(chip);}
});
socket.on('text_answer_cancelled',({name})=>{document.querySelector(`[data-name="${name}"]`)?.remove();});

socket.on('reveal',({correctAnswer,correctAnswers,stats,eliminated:elims,survivorCount,type})=>{
  document.getElementById('hSurv').textContent=survivorCount;
  document.getElementById('lockBanner').style.display='none';
  applyFinalTen(survivorCount);
  fetch('/api/status').then(r=>r.json()).then(d=>{document.getElementById('hElim').textContent=d.players-d.survivors;}).catch(()=>{});
  if(type==='short'&&correctAnswers){
    document.getElementById('shortGrid')?.querySelectorAll('.short-chip').forEach(chip=>{
      const t=chip.textContent.toLowerCase().replace(/\s/g,'');
      const ok=correctAnswers.some(a=>{const n=a.replace(/\s/g,'');return t.includes(n)||n.includes(t);});
      chip.classList.toggle('correct',ok);chip.classList.toggle('wrong',!ok);
    });
  }
  showAnswerReveal(type,correctAnswer,correctAnswers,currentChoices);
  renderChartDebounced(stats||[],currentChoices,correctAnswer,type);
  sfx((elims||[]).length>0?'wrong':'correct');
  if((elims||[]).length>0){document.getElementById('elimNames').textContent=(elims||[]).length<=5?elims.join(', '):`${elims.length}명`;showPop('elimPop');}
});

function showAnswerReveal(type,correctAnswer,correctAnswers,choices){
  const box=document.getElementById('ansRevealBox');
  const txt=document.getElementById('ansRevealText');
  if(!box||!txt)return;
  let ans='';
  if(type==='short'&&correctAnswers?.length){
    ans=correctAnswers.join(' / ');
  }else if((type==='choice'||type==='ox')&&correctAnswer!=null){
    if(choices&&choices[correctAnswer]!=null){
      ans=`${LABELS[correctAnswer]||''} ${choices[correctAnswer]}`;
    }
  }
  if(!ans)return;
  txt.textContent=ans;
  box.classList.remove('hide');
  box.classList.add('show');
  clearTimeout(box._hideTimer);
  box._hideTimer=setTimeout(()=>{
    box.classList.add('hide');
    setTimeout(()=>box.classList.remove('show','hide'),320);
  },2800);
}

socket.on('game_over',({winners,allEliminated})=>{
  if(allEliminated){
    document.getElementById('goIcon').textContent='💀';
    document.getElementById('goTitle').textContent='전원 탈락!';
    document.getElementById('goTitle').className='go-title skull';
    document.getElementById('goWinners').textContent='아쉽게 모두 탈락하셨습니다.';
    document.getElementById('goWinners').className='go-winners all-elim';
  }else{
    document.getElementById('goIcon').textContent='🔔';
    document.getElementById('goTitle').textContent='골든벨!';
    document.getElementById('goTitle').className='go-title golden';
    document.getElementById('goWinners').textContent=winners.length>0?winners.join(' · '):'';
    document.getElementById('goWinners').className='go-winners';
    spawnConfetti();
  }
  show('gameover');sfx('win');
});
socket.on('reset',()=>{document.getElementById('lCount').textContent=0;show('lobby');});

function renderChoices(choices,type,revealAns){
  const area=document.getElementById('contentArea');
  currentChoices=choices;currentType=type;if(ansChart){ansChart.destroy();ansChart=null;}
  if(type==='ox'){
    area.innerHTML=`<div class="cgrid t-2">${choices.map((c,i)=>{const sym=i===0?'⭕':'❌';const cls=revealAns!==undefined?(i===revealAns?(i===0?'co':'cx'):'wrong'):'';return `<div class="oxcard ${cls}"><div class="ox-big">${sym}</div></div>`;}).join('')}</div>`;
  }else if(type==='short'){
    area.innerHTML=`<div class="short-display"><div class="short-top"><div class="short-count-big" id="shortCount">${submittedCount}</div><div class="short-lbl">명 답변 제출</div></div><div class="short-grid" id="shortGrid"></div></div>`;
  }else{
    area.innerHTML=`<div class="cgrid t-2">${choices.map((c,i)=>{const cls=revealAns!==undefined?(i===revealAns?'correct':'wrong'):'';return `<div class="ccard ${cls}"><div class="clabel">${LABELS[i]||i+1}</div><div class="ctext">${c}</div></div>`;}).join('')}</div>`;
  }
}

function renderChart(stats,choices,correctAns,type){
  const area=document.getElementById('contentArea');
  area.innerHTML='<div class="chart-wrap"><canvas id="ansChart"></canvas></div>';
  const ctx2=document.getElementById('ansChart').getContext('2d');
  if(ansChart)ansChart.destroy();
  const labels=choices.map((c,i)=>`${LABELS[i]||i+1}  ${c}`);
  ansChart=new Chart(ctx2,{type:'bar',data:{labels,datasets:[{data:stats,backgroundColor:stats.map((_,i)=>i===correctAns?'#4ade80':'#475569'),borderRadius:9,borderSkipped:false}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${c.raw}명`}}},
      scales:{x:{ticks:{color:'#94a3b8',font:{size:15,weight:'700'}},grid:{color:'#1e293b'}},y:{ticks:{color:'#94a3b8',stepSize:1},grid:{color:'#1e293b'},beginAtZero:true}},
      animation:{duration:900,easing:'easeOutBounce'}}});
}

function showPop(id,dur=3500){const el=document.getElementById(id);el.classList.add('show');setTimeout(()=>el.classList.remove('show'),dur);}
function spawnConfetti(){const c=document.getElementById('conf');const cols=['#f59e0b','#4ade80','#60a5fa','#f87171','#a78bfa','#fb7185','#fff'];for(let i=0;i<100;i++){const p=document.createElement('div');p.className='cp';p.style.cssText=`left:${Math.random()*100}%;top:-20px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*12}px;height:${6+Math.random()*12}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${2+Math.random()*3.5}s;animation-delay:${Math.random()*2.5}s;`;c.appendChild(p);}}

const AC=window.AudioContext||window.webkitAudioContext; let actx=null;
function sfx(type){
  try{
    if(!actx) actx=new AC();
    const g=actx.createGain(), t=actx.currentTime;
    g.connect(actx.destination);
    if(type==='correct'){
      [523.25,659.25,783.99].forEach((f,i)=>{
        const o=actx.createOscillator(); o.type='sine'; o.connect(g);
        o.frequency.setValueAtTime(f,t+i*.1);
        g.gain.setValueAtTime(.0,t+i*.1);
        g.gain.linearRampToValueAtTime(.22,t+i*.1+.02);
        g.gain.exponentialRampToValueAtTime(.001,t+i*.1+.5);
        o.start(t+i*.1); o.stop(t+i*.1+.5);
      });
    } else if(type==='wrong'){
      const o=actx.createOscillator(); o.type='sawtooth'; o.connect(g);
      o.frequency.setValueAtTime(300,t);
      o.frequency.exponentialRampToValueAtTime(80,t+.45);
      g.gain.setValueAtTime(.25,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.45);
      o.start(t); o.stop(t+.45);
    } else if(type==='win'){
      [[523,.0],[659,.15],[784,.3],[1047,.5],[784,.7],[1047,.9],[1319,1.1]].forEach(([f,d])=>{
        const o=actx.createOscillator(); o.type='sine'; o.connect(g);
        o.frequency.setValueAtTime(f,t+d);
        g.gain.setValueAtTime(.22,t+d);
        g.gain.exponentialRampToValueAtTime(.001,t+d+.3);
        o.start(t+d); o.stop(t+d+.3);
      });
    } else if(type==='tick'){
      const o=actx.createOscillator(); o.type='square'; o.connect(g);
      o.frequency.setValueAtTime(1200,t);
      g.gain.setValueAtTime(.08,t);
      g.gain.exponentialRampToValueAtTime(.001,t+.05);
      o.start(t); o.stop(t+.05);
    }
  }catch{}
}

let chartDebounceTimer=null,pendingChartArgs=null;
function renderChartDebounced(stats,choices,correctAns,type){
  pendingChartArgs=[stats,choices,correctAns,type];
  clearTimeout(chartDebounceTimer);
  chartDebounceTimer=setTimeout(()=>{if(pendingChartArgs)renderChart(...pendingChartArgs);pendingChartArgs=null;},200);
}

function applyFinalTen(survivorCount){
  const body=document.body;
  if(survivorCount<=10&&survivorCount>0){
    body.style.background='#020408';
    document.getElementById('hSurv').style.textShadow='0 0 16px #4ade80, 0 0 32px #4ade80';
    document.getElementById('hSurv').style.color='#4ade80';
  }else{
    body.style.background='';
    document.getElementById('hSurv').style.textShadow='';
  }
}

socket.on('timer_paused',({timeLeft})=>{
  const trNum=document.getElementById('trNum');
  if(trNum){trNum.textContent='⏸';trNum.className='tr-n';}
  document.getElementById('trFg').style.transition='none';
});
socket.on('timer_resumed',({timeLeft,timeLimit:tl})=>{
  const trNum=document.getElementById('trNum');
  if(trNum){trNum.textContent=timeLeft;trNum.className='tr-n'+(timeLeft<=5?' urgent':timeLeft<=8?' amber':'');}
  const fg=document.getElementById('trFg');
  if(fg){fg.style.transition='stroke-dashoffset 1s linear';fg.className='tr-fg'+(timeLeft<=5?' urgent':timeLeft<=8?' amber':'');fg.style.strokeDashoffset=(CIRC*(1-timeLeft/(tl||timeLimit))).toFixed(1);}
});

socket.on('show_qr_popup',()=>{if(currentCfUrl)openQrOverlay();});
socket.on('hide_qr_popup',()=>{closeQrOverlay();});
</script>
</body>
</html>
